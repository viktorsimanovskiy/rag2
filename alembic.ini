# ============================================================
# File: alembic.ini
# Purpose:
#   Alembic configuration for the RAG project.
# ============================================================

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
path_separator = os

# URL здесь не храним.
# Берём её из app/config/settings.py внутри env.py
sqlalchemy.url = driver://unused

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s